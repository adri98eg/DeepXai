<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Deep X Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-gradient: linear-gradient(135deg, #6C3EBF 0%, #a855f7 50%, #6C3EBF 100%);
            --electric-purple: #a855f7;
            --dark-bg: #050505;
            --card-bg: #121212;
            --red-color: #ff3b30;
            --text-color: #e0e0e0;
            --gold: #d4af37;
        }

        
        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-top: env(safe-area-inset-top); 
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تصميم الهيدر الاحترافي الجديد */
        .header { 
            text-align: center; 
            padding: 15px 0; 
            margin-bottom: 10px;
            
        }
        
        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: white;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* العلامة الغامضة */
        .mystic-symbol {
            font-size: 18px;
            color: var(--electric-purple);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; text-shadow: 0 0 5px var(--electric-purple); }
            50% { opacity: 0.5; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 5px var(--electric-purple); }
        }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button {
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            padding: 15px;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }

        .btn-red { background: var(--red-color); color: white; }
        .btn-black { background: #1a1a1a; color: white; border: 1px solid #333; }
        .btn-next { grid-column: span 2; background: var(--purple-gradient); color: #fff; font-size: 15px; margin-top: 5px; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3); }
        .btn-reset { grid-column: span 2; background: transparent; color: #555; border: 1px solid #222; font-size: 12px; margin-top: 5px; }

        .round-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1a1a1a;
            margin-bottom: 15px;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.05);
            
            border-radius: 6px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        .round-info { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 12px; padding-left: 35px; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .team { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team-black { justify-content: flex-start; } 
        .team-red { justify-content: flex-end; }
        .vs-score { font-size: 24px; font-weight: 900; color: white; min-width: 80px; text-align: center; font-family: 'Inter'; }

        .avatar {
            width: 26px; height: 26px; border-radius: 50%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: 80%; background-position: center; background-repeat: no-repeat;
        }
        .avatar-black { background-color: #444; border: 1px solid rgba(255,255,255,0.1); }
        .avatar-red { background-color: var(--red-color); }
        .winner-tag { color: white; font-size: 10px; border: 1px solid #fff; padding: 0 4px; border-radius: 3px; }

        .pattern-row {
            display: flex; flex-wrap: wrap; gap: 6px; direction: ltr; justify-content: center;
            border-top: 1px solid #1a1a1a; padding-top: 12px;
        }
        .chip { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .chip-R { background: var(--red-color); color: white; }
        .chip-B { background: #000; color: #fff; border: 1px solid #333; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #0a0a0a;  padding: 25px; border-radius: 15px; text-align: center; width: 280px;  }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-family: 'Cairo'; cursor: pointer; }
        .m-yes { background: var(--red-color); color: white; }
        .m-no { background: #333; color: white; }
    </style>
</head>
<body>

<div class="modal-overlay" id="roundDeleteModal">
    <div class="modal-box">
        <h3 style="color: white; margin: 0 0 10px 0;">حذف الجولة ؟</h3>
        
        <div class="modal-btns">
            <button class="m-btn m-yes" id="confirmSingleDelete">نعم</button>
            <button class="m-btn m-no" onclick="hideDeleteModal()">إلغاء</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <h3 style="color: white; margin: 0 0 10px 0;">تصفير البيانات</h3>
        <p style="font-size: 14px;">هل تود مسح السجل بالكامل ؟</p>
        <div class="modal-btns">
            <button class="m-btn m-yes" onclick="resetData()">نعم</button>
            <button class="m-btn m-no" onclick="hideModal()">إلغاء</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div class="logo-wrapper">
            <span class="mystic-symbol">⚡ </span>
            <h1>Deep X Ai</h1>
        </div>
    </div>

    <div class="controls-grid">
        <button class="btn-black" onclick="log('B')">أسود</button>
        <button class="btn-red" onclick="log('R')">أحمر</button>
        <button class="btn-next" onclick="save()">إنهاء الجولة وحفظ البيانات</button>
        <button class="btn-reset" onclick="showModal()">مسح كافة البيانات</button>
        <div style="color: white; font-size: 14px; grid-column: span 2; text-align: center; margin-top: 5px;">الجولة القادمة: <span id="current-id" style="color:white; font-weight:bold;">1</span></div>
    </div>

    <div id="history-container"></div>
</div>

<script>
    let rounds = JSON.parse(localStorage.getItem('roulette_v8_gold')) || [];
    let activeP = [];
    let currentID = rounds.length > 0 ? Math.max(...rounds.map(r => r.id)) + 1 : 1;
    let roundToDelete = null;

    function render() {
        document.getElementById('current-id').innerText = currentID;
        const container = document.getElementById('history-container');
        container.innerHTML = '';
        if (activeP.length > 0) container.innerHTML += drawCard(currentID, activeP, true, "الآن");
        [...rounds].reverse().forEach(r => container.innerHTML += drawCard(r.id, r.p, false, r.time));
        localStorage.setItem('roulette_v8_gold', JSON.stringify(rounds));
    }

    function drawCard(id, pattern, isLive, time) {
        const reds = pattern.filter(x => x === 'R').length;
        const blacks = pattern.filter(x => x === 'B').length;
        const deleteBtn = !isLive ? `<div class="delete-btn" onclick="showDeleteModal(${id})">✕</div>` : '';
        return `
            <div class="round-card">
                ${deleteBtn}
                <div class="round-info"><span>${time}</span><span>ROUND #${id}</span></div>
                <div class="score-row">
                    <div class="team team-black"><div class="avatar avatar-black"></div><span style="color:#888">أسود</span>${blacks > reds ? '<span class="winner-tag">فائز</span>' : ''}</div>
                    <div class="vs-score">${blacks} - ${reds}</div>
                    <div class="team team-red">${reds > blacks ? '<span class="winner-tag">فائز</span>' : ''}<span style="color:var(--red-color)">أحمر</span><div class="avatar avatar-red"></div></div>
                </div>
                <div class="pattern-row">${pattern.map(p => `<div class="chip chip-${p}">${p}</div>`).join('')}</div>
            </div>`;
    }

    function log(v) { activeP.push(v); render(); }
    function save() {
        if (activeP.length === 0) return;
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}) + " | " + now.toLocaleDateString('ar-EG');
        rounds.push({ id: currentID, p: [...activeP], time: timeStr });
        currentID++; activeP = []; render();
    }

    // وظائف النافذة المنبثقة لحذف الجولة ؟
    function showDeleteModal(id) {
        roundToDelete = id;
        document.getElementById('roundDeleteModal').style.display = 'flex';
    }

    function hideDeleteModal() {
        document.getElementById('roundDeleteModal').style.display = 'none';
        roundToDelete = null;
    }

    document.getElementById('confirmSingleDelete').onclick = function() {
        if (roundToDelete !== null) {
            rounds = rounds.filter(r => r.id !== roundToDelete);
            if (rounds.length === 0) currentID = 1;
            render();
            hideDeleteModal();
        }
    };

    function showModal() { document.getElementById('confirmModal').style.display = 'flex'; }
    function hideModal() { document.getElementById('confirmModal').style.display = 'none'; }
    function resetData() { rounds = []; activeP = []; currentID = 1; render(); hideModal(); }
    
    render();
</script>

</body>
</html>
